<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简手写板</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background-color: #ffffff;
            cursor: crosshair;
        }
        .toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            gap: 15px;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .btn {
            border: none;
            outline: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #f0f0f0;
            color: #333333;
        }
        .btn.active {
            background-color: #007aff;
            color: #ffffff;
        }
        .btn-clear {
            background-color: #ff3b30;
            color: #ffffff;
        }
        .color-picker {
            display: flex;
            gap: 8px;
        }
        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s ease;
        }
        .color-dot.active {
            transform: scale(1.2);
            border-color: #000000;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="toolbar">
        <div class="color-picker">
            <div class="color-dot active" style="background-color: #000000;" data-color="#000000"></div>
            <div class="color-dot" style="background-color: #ff3b30;" data-color="#ff3b30"></div>
            <div class="color-dot" style="background-color: #34c759;" data-color="#34c759"></div>
            <div class="color-dot" style="background-color: #007aff;" data-color="#007aff"></div>
        </div>
        
        <button id="btn-brush" class="btn active">画笔</button>
        <button id="btn-eraser" class="btn">橡皮擦</button>
        <button id="btn-clear" class="btn btn-clear">清空</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btnBrush = document.getElementById('btn-brush');
        const btnEraser = document.getElementById('btn-eraser');
        const btnClear = document.getElementById('btn-clear');
        const colorDots = document.querySelectorAll('.color-dot');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 4;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let drawing = false; 
        let mode = 'brush';  
        let currentColor = '#000000';

        function startDraw(e) {
            drawing = true;
            ctx.beginPath();
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            ctx.moveTo(x, y);
        }

        function draw(e) {
            if (!drawing) return;
            if (e.cancelable) e.preventDefault();

            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;

            if (mode === 'brush') {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = 4;
            } else {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 30; 
            }

            ctx.lineTo(x, y);
            ctx.stroke();
        }

        function stopDraw() {
            drawing = false;
        }

        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDraw);

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);

        btnBrush.addEventListener('click', () => {
            mode = 'brush';
            btnBrush.classList.add('active');
            btnEraser.classList.remove('active');
        });

        btnEraser.addEventListener('click', () => {
            mode = 'eraser';
            btnEraser.classList.add('active');
            btnBrush.classList.remove('active');
        });

        btnClear.addEventListener('click', () => {
            if (confirm('确定要清空整张画布吗？')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        });

        colorDots.forEach(dot => {
            dot.addEventListener('click', (e) => {
                colorDots.forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                
                mode = 'brush';
                btnBrush.classList.add('active');
                btnEraser.classList.remove('active');

                currentColor = dot.getAttribute('data-color');
            });
        });
    </script>
</body>
</html>
