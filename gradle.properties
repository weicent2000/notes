# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m -XX:+UseSerialGC -XX:ReservedCodeCacheSize=96m -Dfile.encoding=UTF-8
org.gradle.parallel=false
org.gradle.caching=false
org.gradle.workers.max=1
org.gradle.daemon=false
org.gradle.configureondemand=false

# In-process Kotlin compilation (no separate daemon)
kotlin.compiler.execution.strategy=in-process
kotlin.daemon.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=256m

android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
